name: turimap
description: Recorrido cultural por Cartagena con Realidad Mixta
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Arquitectura
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.4          # Inyección de dependencias
  flutter_bloc: ^8.1.3    # Gestión de estado (patrón Observer)
  # Mapa
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # Navegación
  go_router: ^13.2.0
  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true